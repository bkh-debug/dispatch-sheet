<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출고지시서 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1417;
    --panel: #171E23;
    --panel-2: #1D262C;
    --line: #2A353D;
    --text: #E7ECEE;
    --text-dim: #8CA0AA;
    --amber: #F0A828;
    --amber-dim: #6B4E1E;
    --teal: #2FBFA6;
    --red: #E0604F;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
  }
  ::selection{ background:var(--amber); color:#1a1206;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #141A1E, #0F1417);
    position:sticky; top:0; z-index:20;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand .mark{
    width:34px; height:34px; border-radius:8px;
    background:repeating-linear-gradient(45deg, var(--amber), var(--amber) 4px, #1a1206 4px, #1a1206 8px);
    flex-shrink:0;
  }
  .brand h1{ font-family:var(--font-display); font-size:19px; margin:0; letter-spacing:0.2px;}
  .brand .sub{ font-size:12px; color:var(--text-dim); margin-top:2px;}
  .status{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); font-family:var(--font-mono);}
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--red); box-shadow:0 0 0 3px rgba(224,96,79,0.15);}
  .dot.ok{ background:var(--teal); box-shadow:0 0 0 3px rgba(47,191,166,0.15);}

  .wrap{ max-width:1180px; margin:0 auto; padding:24px 20px 80px; }

  .setup{
    border:1px solid var(--amber-dim); background:rgba(240,168,40,0.06);
    border-radius:10px; padding:16px 18px; margin-bottom:22px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .setup p{ margin:0; font-size:13.5px; color:var(--text-dim); line-height:1.6;}
  .setup strong{ color:var(--text); }

  .grid{ display:grid; grid-template-columns: 1.1fr 1.6fr; gap:20px; align-items:start;}
  @media (max-width: 880px){ .grid{ grid-template-columns:1fr; } }

  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:20px 20px 22px;
  }
  .panel h2{
    font-family:var(--font-display); font-size:14px; margin:0 0 16px;
    text-transform:uppercase; letter-spacing:1.2px; color:var(--text-dim);
    display:flex; align-items:center; gap:8px;
  }
  .panel h2::before{ content:''; width:3px; height:14px; background:var(--amber); display:inline-block; border-radius:2px;}

  label{ display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px; margin-top:14px;}
  label:first-of-type{ margin-top:0;}
  input, select{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:7px; font-size:14px; font-family:var(--font-body);
  }
  input:focus, select:focus{ outline:none; border-color:var(--amber); }
  input[list]{ font-family:var(--font-mono); }
  .row4{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .hint{ font-size:11.5px; color:var(--text-dim); margin-top:5px; }
  .product-name{ font-family:var(--font-mono); color:var(--teal); font-size:13px; margin-top:6px; min-height:16px;}

  .qty-live{
    margin-top:16px; padding:12px 14px; background:var(--panel-2); border-radius:8px;
    display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:13px;
  }
  .qty-live b{ color:var(--amber); font-size:16px;}

  button{
    font-family:var(--font-body); font-weight:600; cursor:pointer; border:none; border-radius:7px;
    padding:11px 18px; font-size:14px; transition:transform .06s ease, opacity .15s ease;
  }
  button:active{ transform:scale(0.98); }
  .btn-primary{ background:var(--amber); color:#1a1206; width:100%; margin-top:18px; }
  .btn-primary:hover{ opacity:0.92; }
  .btn-ghost{ background:transparent; border:1px solid var(--line); color:var(--text); }
  .btn-ghost:hover{ border-color:var(--amber); color:var(--amber); }
  .btn-danger{ background:transparent; color:var(--red); border:1px solid rgba(224,96,79,0.4); padding:5px 10px; font-size:12px;}
  .btn-danger:hover{ background:rgba(224,96,79,0.1); }

  .filter-bar{ display:flex; gap:10px; align-items:flex-end; margin-bottom:16px; flex-wrap:wrap;}
  .filter-bar > div{ flex:1; min-width:140px;}
  .filter-bar label{ margin-top:0; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.6px;
    color:var(--text-dim); padding:8px 10px; border-bottom:1px solid var(--line); font-weight:600;
  }
  tbody td{ padding:9px 10px; border-bottom:1px solid var(--line); font-family:var(--font-mono); }
  tbody tr:hover{ background:rgba(255,255,255,0.02); }
  .tag{ padding:2px 8px; border-radius:20px; font-size:11px; font-family:var(--font-body); font-weight:600;}
  .tag.ep1{ background:rgba(47,191,166,0.15); color:var(--teal); }
  .tag.mail{ background:rgba(240,168,40,0.15); color:var(--amber); }
  .empty-row td{ text-align:center; color:var(--text-dim); font-family:var(--font-body); padding:30px 10px;}

  .totals{
    display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px;
  }
  .totals .box{ background:var(--panel-2); border-radius:8px; padding:12px 14px; }
  .totals .box .lbl{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px;}
  .totals .box .val{ font-family:var(--font-mono); font-size:20px; margin-top:4px; color:var(--text); }
  .totals .box.amber .val{ color:var(--amber); }
  .totals .box.teal .val{ color:var(--teal); }

  .toolbar-right{ display:flex; gap:8px; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--line); padding:12px 20px; border-radius:8px;
    font-size:13px; opacity:0; transition:opacity .25s ease; pointer-events:none; z-index:50;
  }
  .toast.show{ opacity:1; }
  .toast.err{ border-color:var(--red); color:var(--red); }

  .config-note{
    font-family:var(--font-mono); font-size:12px; background:var(--panel-2); padding:14px;
    border-radius:8px; color:var(--text-dim); white-space:pre-wrap; line-height:1.6;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark"></div>
    <div>
      <h1>출고지시서 관리</h1>
      <div class="sub">Firebase Firestore 실시간 연동</div>
    </div>
  </div>
  <div class="status">
    <span class="dot" id="connDot"></span>
    <span id="connText">연결 확인 중...</span>
  </div>
</div>

<div class="wrap">

  <div class="setup" id="setupBanner" style="display:none;">
    <p>제품 마스터 데이터(<strong id="masterCount">251</strong>건)가 아직 저장되지 않았어요. 최초 1회만 눌러주세요.</p>
    <button class="btn-ghost" id="importBtn">제품 마스터 가져오기</button>
  </div>

  <div class="grid">

    <div class="panel">
      <h2>출고 등록</h2>

      <label>날짜</label>
      <input type="date" id="fDate">

      <label>제품코드</label>
      <input type="text" id="fCode" list="productList" placeholder="예: 3300" autocomplete="off">
      <datalist id="productList"></datalist>
      <div class="product-name" id="fName"></div>

      <label>출고방식</label>
      <select id="fShipType">
        <option value="EP1">EP1</option>
        <option value="메일">메일</option>
      </select>

      <label>호차별 수량</label>
      <div class="row4">
        <input type="number" id="fV1" placeholder="1호차" min="0">
        <input type="number" id="fV2" placeholder="2호차" min="0">
        <input type="number" id="fV3" placeholder="3호차" min="0">
        <input type="number" id="fV4" placeholder="4호차" min="0">
      </div>

      <label>위치 / 담당자 <span style="color:var(--text-dim); font-weight:400;">(선택)</span></label>
      <input type="text" id="fNote" placeholder="예: A동 2층">

      <div class="qty-live">
        <span>신청수량 합계</span>
        <b id="qtyLive">0</b>
      </div>

      <button class="btn-primary" id="submitBtn">출고 등록</button>
    </div>

    <div class="panel">
      <h2>출고 목록</h2>
      <div class="filter-bar">
        <div>
          <label>조회 날짜</label>
          <input type="date" id="viewDate">
        </div>
        <div class="toolbar-right" style="flex:0;">
          <button class="btn-ghost" id="exportBtn">CSV 내보내기</button>
        </div>
      </div>

      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>코드</th><th>제품명</th><th>방식</th>
              <th>1호</th><th>2호</th><th>3호</th><th>4호</th>
              <th>합계</th><th>위치/담당자</th><th></th>
            </tr>
          </thead>
          <tbody id="orderRows">
            <tr class="empty-row"><td colspan="10">해당 날짜의 출고 내역이 없습니다.</td></tr>
          </tbody>
        </table>
      </div>

      <div class="totals">
        <div class="box"><div class="lbl">전체 신청수량</div><div class="val" id="totQty">0</div></div>
        <div class="box teal"><div class="lbl">EP1 출고</div><div class="val" id="totEp1">0</div></div>
        <div class="box amber"><div class="lbl">메일 출고</div><div class="val" id="totMail">0</div></div>
        <div class="box"><div class="lbl">건수</div><div class="val" id="totCount">0</div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>

function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(()=> t.className = 'toast', 2400);
}

function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function initFirebase(){
  const notConfigured = !firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf('여기에') !== -1;
  if(notConfigured){
    document.getElementById('connText').textContent = 'Firebase 설정 필요 (index.html 상단 firebaseConfig)';
    document.getElementById('setupBanner').style.display = 'flex';
    document.getElementById('setupBanner').innerHTML =
      '<p><strong>Firebase 설정이 아직 안 되어 있어요.</strong><br>index.html 파일 상단의 firebaseConfig 값을 Firebase 콘솔에서 복사해 붙여넣은 뒤 다시 열어주세요. (README.md 1단계 참고)</p>';
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    document.getElementById('connDot').classList.add('ok');
    document.getElementById('connText').textContent = 'Firestore 연결됨';
    checkProductsSeeded();
    listenOrders();
  }catch(e){
    document.getElementById('connText').textContent = '연결 실패: ' + e.message;
    toast('Firebase 연결 실패: ' + e.message, true);
  }
}

async function checkProductsSeeded(){
  const snap = await db.collection('products').limit(1).get();
  if(snap.empty){
    document.getElementById('setupBanner').style.display = 'flex';
  }else{
    document.getElementById('setupBanner').style.display = 'none';
  }
  loadProductsForAutocomplete();
}

async function loadProductsForAutocomplete(){
  const snap = await db.collection('products').get();
  productsMap = {};
  const dl = document.getElementById('productList');
  dl.innerHTML = '';
  if(!snap.empty){
    snap.forEach(doc=>{
      const d = doc.data();
      productsMap[d.code] = d.name || '';
      const opt = document.createElement('option');
      opt.value = d.code;
      opt.label = d.name || '';
      dl.appendChild(opt);
    });
  }else{
    PRODUCTS_SEED.forEach(p=>{ productsMap[p.code] = p.name; });
  }
}

document.getElementById('importBtn').addEventListener('click', async ()=>{
  if(!db){ toast('먼저 Firebase 설정을 완료해주세요.', true); return; }
  const btn = document.getElementById('importBtn');
  btn.disabled = true; btn.textContent = '가져오는 중...';
  try{
    const batchSize = 400;
    for(let i=0; i<PRODUCTS_SEED.length; i+=batchSize){
      const batch = db.batch();
      PRODUCTS_SEED.slice(i, i+batchSize).forEach(p=>{
        const ref = db.collection('products').doc(p.code);
        batch.set(ref, { code: p.code, name: p.name });
      });
      await batch.commit();
    }
    toast('제품 마스터 ' + PRODUCTS_SEED.length + '건을 가져왔습니다.');
    document.getElementById('setupBanner').style.display = 'none';
    loadProductsForAutocomplete();
  }catch(e){
    toast('가져오기 실패: ' + e.message, true);
  }
  btn.disabled = false; btn.textContent = '제품 마스터 가져오기';
});

document.getElementById('fCode').addEventListener('input', (e)=>{
  const code = e.target.value.trim();
  document.getElementById('fName').textContent = productsMap[code] ? '→ ' + productsMap[code] : '';
});

['fV1','fV2','fV3','fV4'].forEach(id=>{
  document.getElementById(id).addEventListener('input', updateLiveQty);
});
function updateLiveQty(){
  const sum = ['fV1','fV2','fV3','fV4'].reduce((a,id)=> a + (Number(document.getElementById(id).value)||0), 0);
  document.getElementById('qtyLive').textContent = sum;
}

document.getElementById('submitBtn').addEventListener('click', async ()=>{
  if(!db){ toast('먼저 Firebase 설정을 완료해주세요.', true); return; }
  const date = document.getElementById('fDate').value;
  const code = document.getElementById('fCode').value.trim();
  if(!date){ toast('날짜를 선택해주세요.', true); return; }
  if(!code){ toast('제품코드를 입력해주세요.', true); return; }

  const v1 = Number(document.getElementById('fV1').value)||0;
  const v2 = Number(document.getElementById('fV2').value)||0;
  const v3 = Number(document.getElementById('fV3').value)||0;
  const v4 = Number(document.getElementById('fV4').value)||0;
  const qty = v1+v2+v3+v4;
  const shipType = document.getElementById('fShipType').value;

  const order = {
    date, productCode: code, productName: productsMap[code] || '',
    shipType, v1,v2,v3,v4, qty,
    ep1Qty: shipType === 'EP1' ? qty : 0,
    mailQty: shipType === '메일' ? qty : 0,
    note: document.getElementById('fNote').value.trim(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try{
    await db.collection('orders').add(order);
    toast('출고 등록 완료');
    document.getElementById('fCode').value = '';
    document.getElementById('fName').textContent = '';
    document.getElementById('fV1').value = '';
    document.getElementById('fV2').value = '';
    document.getElementById('fV3').value = '';
    document.getElementById('fV4').value = '';
    document.getElementById('fNote').value = '';
    updateLiveQty();
  }catch(e){
    toast('등록 실패: ' + e.message, true);
  }
});

function listenOrders(){
  const viewDate = document.getElementById('viewDate').value || todayStr();
  document.getElementById('viewDate').value = viewDate;
  if(unsubscribeOrders) unsubscribeOrders();
  unsubscribeOrders = db.collection('orders').where('date','==', viewDate)
    .onSnapshot(snap=>{
      currentOrders = [];
      snap.forEach(doc=> currentOrders.push({ id: doc.id, ...doc.data() }));
      renderOrders();
    }, err=>{
      toast('목록 조회 실패: ' + err.message, true);
    });
}

document.getElementById('viewDate').addEventListener('change', ()=>{ if(db) listenOrders(); });

function renderOrders(){
  const tbody = document.getElementById('orderRows');
  tbody.innerHTML = '';
  if(currentOrders.length === 0){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="10">해당 날짜의 출고 내역이 없습니다.</td></tr>';
  }else{
    currentOrders.forEach(o=>{
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td>'+o.productCode+'</td>'+
        '<td>'+(o.productName||'-')+'</td>'+
        '<td><span class="tag '+(o.shipType==='EP1'?'ep1':'mail')+'">'+o.shipType+'</span></td>'+
        '<td>'+(o.v1||0)+'</td><td>'+(o.v2||0)+'</td><td>'+(o.v3||0)+'</td><td>'+(o.v4||0)+'</td>'+
        '<td>'+o.qty+'</td>'+
        '<td style="font-family:var(--font-body);">'+(o.note||'-')+'</td>'+
        '<td><button class="btn-danger" data-id="'+o.id+'">삭제</button></td>';
      tbody.appendChild(tr);
    });
  }
  tbody.querySelectorAll('.btn-danger').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('이 출고 내역을 삭제할까요?')) return;
      try{ await db.collection('orders').doc(btn.dataset.id).delete(); toast('삭제 완료'); }
      catch(e){ toast('삭제 실패: ' + e.message, true); }
    });
  });

  const totQty = currentOrders.reduce((a,o)=>a+o.qty,0);
  const totEp1 = currentOrders.reduce((a,o)=>a+(o.ep1Qty||0),0);
  const totMail = currentOrders.reduce((a,o)=>a+(o.mailQty||0),0);
  document.getElementById('totQty').textContent = totQty;
  document.getElementById('totEp1').textContent = totEp1;
  document.getElementById('totMail').textContent = totMail;
  document.getElementById('totCount').textContent = currentOrders.length;
}

document.getElementById('exportBtn').addEventListener('click', ()=>{
  if(currentOrders.length === 0){ toast('내보낼 데이터가 없습니다.', true); return; }
  const header = ['날짜','제품코드','제품명','방식','1호차','2호차','3호차','4호차','합계','위치/담당자'];
  const rows = currentOrders.map(o=>[o.date,o.productCode,o.productName,o.shipType,o.v1,o.v2,o.v3,o.v4,o.qty,o.note]);
  const csv = [header, ...rows].map(r=> r.map(v=> '"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '출고지시서_' + document.getElementById('viewDate').value + '.csv';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('fDate').value = todayStr();
document.getElementById('viewDate').value = todayStr();
PRODUCTS_SEED.forEach(p=>{ productsMap[p.code] = p.name; });
initFirebase();
</script>
</body>
</html>
